<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="F1 Hub - Your Ultimate Formula 1 Destination. Stay updated with the latest news, teams, drivers, and schedule of the F1 season.">
    <meta name="keywords" content="F1, Formula 1, F1 Hub, F1 News, F1 Teams, F1 Drivers, F1 Schedule, Grand Prix, Motorsport">
    <meta name="author" content="Petar Iliev">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400..700;1,400..700&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Orbitron:wght@400..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="icon" type="image/x-icon" href="./images/f1_logo.png">
    <link rel="stylesheet" href="./styles/style.css">
    <title>F1 Hub</title>
</head>
<body>
    <header>
        <div class="header-content d-flex align-items-center justify-content-evenly">
            <img src="./images/f1_logo.png" alt="F1 Hub Logo" class="logo">
            <nav>
                <ul class="nav-list list-unstyled d-md-inline-flex d-none gap-4 m-0">
                    <li><a href="#home">Home</a></li>
                    <li><a href="#">News</a></li>
                    <li><a href="#">Teams</a></li>
                    <li><a href="#">Drivers</a></li>
                    <li><a href="#">Schedule</a></li>
                </ul>
            </nav>
            <div class="social-media d-flex gap-3 m-0">
                <a href="#"><i class="bi bi-facebook"></i></a>
                <a href="#"><i class="bi bi-twitter"></i></a>
                <a href="#"><i class="bi bi-instagram"></i></a>
                <a href="#"><i class="bi bi-youtube"></i></a>
            </div>
        </div>
    </header>

    <main>
        <section class="bottm-bar-nav">
                <nav>
                    <ul class="nav-list list-unstyled d-md-none d-none gap-4 m-0" id="bottom-bar">
                        <li><a href="#"><i class="bi bi-newspaper"></i></a></li>
                        <li><a href="#"><i class="bi bi-people"></i></a></li>
                        <li><a href="#home"><i class="bi bi-house"></i></a></li>
                        <li><a href="#"><i class="bi bi-calendar-event"></i></a></li>
                        <li><a href="#"><i class="bi bi-trophy"></i></a></li>
                    </ul>
                </nav>
        </section>

        <section class="hero-section" id="home">
            <div class="hero-text container-fluid text-white p-3">
                <p class="text-uppercase opacity-75">F1 Mono Sprint</p>
                <h1 class="display-4 fw-bold" id="grand-prix-name"></h1>
                <div class="race-info mb-3">
                    <p class="mb-0 race-location" id="circuit-name"></p>
                </div>

                <p class="opacity-75">LIVE COUNTDOWN TO THE GRAND PRIX</p>

                <div class="countdown d-flex gap-4 mt-3">
                    <div class="time-box d-flex flex-column align-items-center">
                        <span class="time">0</span>
                        <span class="label">DAYS</span>
                    </div>
                    
                    <div class="time-box d-flex flex-column align-items-center">
                        <span class="time">0</span>
                        <span class="label">HOURS</span>
                    </div>
                   
                    <div class="time-box d-flex flex-column align-items-center">
                        <span class="time">0</span>
                        <span class="label">MINUTES</span>
                    </div>

                    <div class="time-box d-flex flex-column align-items-center">
                        <span class="time">0</span>
                        <span class="label">SECONDS</span>
                    </div>
                </div>
                
                <div class="button mt-4 d-flex justify-content-center justify-content-md-start gap-2">
                    <button class="btn btn-danger btn-md" id="notifyBtn">Learn More</button>
                </div>
            </div>
        </section>
        
        <section class="container last-race-card-information">
            <h2 class="mb-4 text-white" id="feature-race"></h2>

            <div class="card d-flex flex-row align-items-center">
                <img src="./images/f1-logo-white.png" width="80" id="card-image">
                <img src ="#" alt="Circuit Country Flag" class="country-flag rounded-4" width="50" id="circuit-image">

                <div class="card-body d-flex flex-column align-items-center gap-4" id="cardBody">

                    <img src="#" alt="Monaco Grand Prix" class="race-image rounded-4" width="250">

                    <div class="card-text">
                        <h3 id="last-race-date"></h3>
                    </div>
                </div>

            </div>
        </section>

    </main>
    <footer></footer>
    <script src="./scripts/main.js" type="module"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
